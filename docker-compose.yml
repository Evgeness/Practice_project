services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-knowledge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-knowledge} -d ${POSTGRES_DB:-knowledge}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9201:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  #redis:
  #image: redis:7-alpine
  #command: redis-server --appendonly yes
  #volumes:
  #- redis_data:/data
  #healthcheck:
  #test: ["CMD", "redis-cli", "ping"]
  #interval: 5s
  #timeout: 3s
  #retries: 20

  app:
    build: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      AUTH_USERNAME: ${AUTH_USERNAME:-student}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-practice2026}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-this-secret-before-publication}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-480}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-knowledge}:${POSTGRES_PASSWORD:-knowledge}@postgres:5432/${POSTGRES_DB:-knowledge}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-documents}
      REDIS_URL: redis://redis:6379/0
      REDIS_TTL_SECONDS: ${REDIS_TTL_SECONDS:-300}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  front:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

